name: DDGK CI — Paradoxon AI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'   # Täglich 06:00 UTC — Guardian Self-Test

jobs:
  guardian-test:
    name: 🛡️ Guardian + Core Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -q pytest requests rich fastapi uvicorn httpx
        pip install -q psutil paramiko 2>/dev/null || true
    
    - name: 🛡️ Guardian Self-Test
      run: |
        python -c "
        import sys, hashlib, json
        sys.path.insert(0, '.')
        
        # Guardian Core Logic Test
        DENY = ['rm -rf', 'format', 'drop database', 'shutdown -h']
        REQUIRE_HUMAN = ['email_send', 'deploy_external', 'stripe_charge']
        
        def guardian_check(action):
            a = action.lower()
            if any(p in a for p in DENY): return 'DENY'
            if any(p in a for p in REQUIRE_HUMAN): return 'REQUIRE_HUMAN'
            return 'AUTO_APPROVE'
        
        tests = [
            ('check_disk',      'AUTO_APPROVE'),
            ('rm -rf /',        'DENY'),
            ('email_send',      'REQUIRE_HUMAN'),
            ('memory_pipeline', 'AUTO_APPROVE'),
            ('drop database',   'DENY'),
        ]
        failed = 0
        for action, expected in tests:
            result = guardian_check(action)
            ok = result == expected
            print(f'  {\"PASS\" if ok else \"FAIL\"}: guardian(\"{action}\") = {result}')
            if not ok: failed += 1
        
        print(f'Guardian Tests: {len(tests)-failed}/{len(tests)} passed')
        sys.exit(failed)
        "
    
    - name: 🧠 Proof-of-Work SHA Chain Test
      run: |
        python -c "
        import sys, json, hashlib, tempfile
        from pathlib import Path
        
        # Simuliere PoW Chain
        entries = []
        prev = 'genesis'
        for i in range(5):
            e = {'i': i, 'prev': prev, 'data': f'test_{i}'}
            h = hashlib.sha256(json.dumps(e, sort_keys=True).encode()).hexdigest()[:16]
            e['hash'] = h
            entries.append(e)
            prev = h
        
        # Verify chain
        ok = all(entries[i]['prev'] == entries[i-1]['hash'] for i in range(1,5))
        print(f'SHA Chain: {\"VALID\" if ok else \"BROKEN\"} ({len(entries)} entries)')
        sys.exit(0 if ok else 1)
        "
    
    - name: 📋 File Integrity Check
      run: |
        python -c "
        from pathlib import Path
        required = [
            'ddgk_guardian_v2.py',
            'ddgk_api_server.py',
            'ddgk_legal_agent.py',
            'ddgk_market_trajectory.py',
            'ddgk_orchestrator.py',
            'cognitive_ddgk/fusion_kernel.py',
            'cognitive_ddgk/decision_trace.py',
            '.github/FUNDING.yml',
            'CITATION.cff',
        ]
        missing = [f for f in required if not Path(f).exists()]
        for m in missing: print(f'MISSING: {m}')
        if missing: exit(1)
        print(f'All {len(required)} required files present.')
        "
    
    - name: 🔐 Security Scan (no hardcoded secrets)
      run: |
        python -c "
        import re
        from pathlib import Path
        
        PATTERNS = [
            r'password\s*=\s*[\"'][^\"']{6,}[\"']',
            r'ghp_[a-zA-Z0-9]{36}',
            r'sk-[a-zA-Z0-9]{48}',
            r'hf_[a-zA-Z0-9]{30,}',
        ]
        
        found = []
        for f in Path('.').rglob('*.py'):
            if '.git' in str(f): continue
            try:
                txt = f.read_text('utf-8', errors='replace')
                for p in PATTERNS:
                    if re.search(p, txt, re.I):
                        found.append(str(f))
                        break
            except: pass
        
        if found:
            print('SECURITY: Potential secrets in:', found)
            exit(1)
        print(f'Security scan clean. No hardcoded secrets found.')
        "

  kappa-test:
    name: 🔭 κ-Metric Sanity Check
    runs-on: ubuntu-latest
    needs: guardian-test
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.11' }
    
    - name: 📊 κ Coherence Metric Test
      run: |
        python -c "
        import math
        
        def compute_kappa(signals):
            if not signals: return 0.0
            mean = sum(signals) / len(signals)
            variance = sum((x-mean)**2 for x in signals) / len(signals)
            return round(mean / (1 + math.sqrt(variance) + 0.001), 4)
        
        # Normalfall
        k1 = compute_kappa([0.8, 0.85, 0.9, 0.82])
        assert 0.5 < k1 < 2.0, f'κ out of range: {k1}'
        
        # Leeres Signal
        k2 = compute_kappa([])
        assert k2 == 0.0, f'Empty signal should be 0, got {k2}'
        
        # Hohe Kohärenz
        k3 = compute_kappa([1.0, 1.0, 1.0, 1.0])
        assert k3 > 0.5, f'Perfect coherence should be > 0.5: {k3}'
        
        print(f'κ Tests: k1={k1} k2={k2} k3={k3} — ALL PASS')
        "
    
    - name: 📜 CITATION.cff Validation
      run: |
        python -c "
        from pathlib import Path
        cff = Path('CITATION.cff').read_text('utf-8', errors='replace')
        required = ['title', 'authors', 'version', 'doi']
        missing = [r for r in required if r not in cff.lower()]
        if missing: print('CITATION.cff missing:', missing); exit(1)
        print('CITATION.cff valid.')
        "

  badge-update:
    name: 📊 Status Badge
    runs-on: ubuntu-latest
    needs: [guardian-test, kappa-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    - name: ✅ All tests passed
      run: |
        echo "DDGK CI passed: Guardian + SHA-Chain + κ-Metric + Security"
        echo "Build: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "Repo: Paradoxon AI / OR1ON DDGK"
